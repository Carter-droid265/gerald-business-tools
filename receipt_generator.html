<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Generator</title>
<link rel="manifest" href="/gerald-business-tools/receipt-manifest.json">
<meta name="theme-color" content="#16302b">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --ink: #16302b;
    --paper: #f7f5ef;
    --line: #d8d2c2;
    --accent: #c0762b;
    --accent-dark: #93551b;
    --good: #2d6a4f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--ink);
    color: var(--ink);
    min-height: 100vh;
    padding: 16px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  h1 {
    color: var(--paper);
    font-size: 1.4rem;
    margin: 4px 0 18px;
    letter-spacing: 0.3px;
  }
  h1 span { color: var(--accent); }
  .card {
    background: var(--paper);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
  }
  label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--ink); margin: 10px 0 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 1rem;
    background: #fff;
  }
  input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .item-row {
    display: grid;
    grid-template-columns: 1fr 60px 80px 28px;
    gap: 6px;
    align-items: end;
    margin-bottom: 8px;
  }
  .item-row label { display: none; }
  .item-row:first-of-type label { display: block; }
  .remove-btn {
    background: none; border: none; color: #b3261e; font-size: 1.2rem; cursor: pointer; padding: 8px 0;
  }
  .add-btn, .pdf-btn, .wa-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
  }
  .add-btn { background: #fff; border: 1px dashed var(--accent); color: var(--accent-dark); }
  .pdf-btn { background: var(--accent); color: #fff; }
  .wa-btn { background: var(--good); color: #fff; }
  .total-row {
    display: flex; justify-content: space-between; align-items: baseline;
    border-top: 2px solid var(--line); margin-top: 14px; padding-top: 12px;
  }
  .total-row span:first-child { font-size: 0.9rem; color: #555; }
  .total-row span:last-child { font-size: 1.5rem; font-weight: 700; color: var(--good); }
  .hint { color: #94a89f; font-size: 0.78rem; margin-top: -10px; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Receipt<span>Builder</span></h1>
  <p class="hint" style="color:#cdd9d4;">Fill in your business and items below, then generate a PDF.</p>

  <div class="card">
    <label>Business Name</label>
    <input id="bizName" placeholder="e.g. Gerald's Mini Mart">
    <label>Customer Name (optional)</label>
    <input id="custName" placeholder="Walk-in customer">
  </div>

  <div class="card">
    <label>Items</label>
    <div id="itemsContainer"></div>
    <button class="add-btn" onclick="addItem()">+ Add item</button>

    <div class="total-row">
      <span>TOTAL (MWK)</span>
      <span id="totalDisplay">0</span>
    </div>
  </div>

  <button class="pdf-btn" onclick="generatePDF()">Download PDF Receipt</button>
  <button class="wa-btn" onclick="shareWhatsApp()">Share Summary on WhatsApp</button>
</div>

<script>
let itemCount = 0;

function addItem(name = '', qty = 1, price = '') {
  itemCount++;
  const id = itemCount;
  const container = document.getElementById('itemsContainer');
  const row = document.createElement('div');
  row.className = 'item-row';
  row.id = 'row-' + id;
  row.innerHTML = `
    <div><label>Item</label><input oninput="updateTotal()" id="name-${id}" value="${name}" placeholder="Item name"></div>
    <div><label>Qty</label><input oninput="updateTotal()" id="qty-${id}" type="number" value="${qty}" min="1"></div>
    <div><label>Price</label><input oninput="updateTotal()" id="price-${id}" type="number" value="${price}" placeholder="0"></div>
    <button class="remove-btn" onclick="removeItem(${id})">✕</button>
  `;
  container.appendChild(row);
  updateTotal();
}

function removeItem(id) {
  document.getElementById('row-' + id).remove();
  updateTotal();
}

function getItems() {
  const rows = document.querySelectorAll('.item-row');
  const items = [];
  rows.forEach(row => {
    const id = row.id.split('-')[1];
    const name = document.getElementById('name-' + id).value || 'Item';
    const qty = parseFloat(document.getElementById('qty-' + id).value) || 0;
    const price = parseFloat(document.getElementById('price-' + id).value) || 0;
    items.push({ name, qty, price, subtotal: qty * price });
  });
  return items;
}

function updateTotal() {
  const total = getItems().reduce((sum, i) => sum + i.subtotal, 0);
  document.getElementById('totalDisplay').textContent = total.toLocaleString();
}

function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const biz = document.getElementById('bizName').value || 'My Business';
  const cust = document.getElementById('custName').value || 'Walk-in customer';
  const items = getItems();
  const total = items.reduce((s, i) => s + i.subtotal, 0);

  doc.setFontSize(16);
  doc.text(biz, 14, 18);
  doc.setFontSize(10);
  doc.text('Receipt for: ' + cust, 14, 26);
  doc.text('Date: ' + new Date().toLocaleDateString(), 14, 32);

  let y = 44;
  doc.setFontSize(11);
  doc.text('Item', 14, y);
  doc.text('Qty', 110, y);
  doc.text('Price', 135, y);
  doc.text('Subtotal', 165, y);
  y += 6;
  doc.line(14, y - 4, 196, y - 4);

  items.forEach(i => {
    doc.text(i.name, 14, y);
    doc.text(String(i.qty), 110, y);
    doc.text(i.price.toLocaleString(), 135, y);
    doc.text(i.subtotal.toLocaleString(), 165, y);
    y += 7;
  });

  y += 4;
  doc.line(14, y - 5, 196, y - 5);
  doc.setFontSize(13);
  doc.text('TOTAL: MWK ' + total.toLocaleString(), 14, y + 4);

  doc.save(biz.replace(/\s+/g, '_') + '_receipt.pdf');
}

function shareWhatsApp() {
  const biz = document.getElementById('bizName').value || 'My Business';
  const items = getItems();
  const total = items.reduce((s, i) => s + i.subtotal, 0);
  let text = `Receipt - ${biz}\n`;
  items.forEach(i => { text += `${i.name} x${i.qty}: MWK ${i.subtotal.toLocaleString()}\n`; });
  text += `\nTOTAL: MWK ${total.toLocaleString()}`;
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

addItem();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/gerald-business-tools/service-worker.js');
}
</script>
</body>
</html>
